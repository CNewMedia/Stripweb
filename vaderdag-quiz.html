// ---- STATE ----
let current = 0;
let scores = {};
Object.keys(profiles).forEach(k => scores[k] = 0);

const content = document.getElementById('content');

function renderIntro() {
  content.innerHTML = `
    <div class="fade-in center">
      <div class="q-emoji">📚</div>
      <p class="intro-text">Vaderdag valt op <strong>zondag 14 juni</strong>. Maar welke strip past nu écht bij jouw vader?</p>
      <p class="intro-text">Beantwoord 5 korte vragen en ontdek zijn vaderprofiel — met concrete stripsuggesties uit het Stripweb-assortiment.</p>
      <button class="btn" id="startBtn">Start de quiz →</button>
    </div>`;
  document.getElementById('startBtn').onclick = () => { current = 0; renderQuestion(); };
}

function renderQuestion() {
  const q = questions[current];
  const pct = (current / questions.length) * 100;
  content.innerHTML = `
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${current + 1}/${questions.length}</span>
    </div>
    <div class="fade-in">
      <div class="q-emoji">${q.emoji}</div>
      <div class="question">${q.q}</div>
      <div class="options">
        ${q.options.map((opt, i) => `
          <button class="option" data-i="${i}">
            <span class="opt-emoji">${opt.e}</span>
            <span>${opt.label}</span>
          </button>`).join('')}
      </div>
    </div>`;
  // animate progress fill after paint
  requestAnimationFrame(() => {
    const fill = content.querySelector('.progress-fill');
    if (fill) fill.style.width = ((current) / questions.length * 100) + '%';
  });
  content.querySelectorAll('.option').forEach(btn => {
    btn.onclick = () => {
      const opt = q.options[btn.dataset.i];
      for (const [k, v] of Object.entries(opt.scores)) scores[k] += v;
      current++;
      if (current < questions.length) renderQuestion();
      else renderResult();
    };
  });
}

function topProfile() {
  let best = null, bestScore = -1;
  // Stable order = declaration order of profiles object
  for (const key of Object.keys(profiles)) {
    if (scores[key] > bestScore) { bestScore = scores[key]; best = key; }
  }
  return best;
}

function renderResult() {
  const key = topProfile();
  const p = profiles[key];
  content.innerHTML = `
    <div class="fade-in">
      <div class="progress-row">
        <div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>
        <span class="progress-label">Klaar!</span>
      </div>
      <div class="result-profile-emoji">${p.emoji}</div>
      <p class="result-kicker">Jouw vader is…</p>
      <h2 class="result-name">${p.name}</h2>
      <p class="result-desc">${p.desc}</p>
      <div class="result-genre"><strong>Wat hem raakt:</strong> ${p.genre}.</div>
      <div class="picks-title">Onze topkeuzes voor hem</div>
      ${p.picks.map(pick => `
        <a class="pick" href="${pick.u}" target="_blank" rel="noopener">
          <div class="pick-title"><span class="arrow">→</span> ${pick.t}${pick.a ? ` <span class="pick-author">(${pick.a})</span>` : ''}</div>
          <div class="pick-note">${pick.n}</div>
        </a>`).join('')}
      <div class="result-cta">
        <a class="btn yellow" href="${GUIDE_URL}" target="_blank" rel="noopener">Lees de volledige gids — alle 15 vaders</a>
        <a class="btn secondary" href="${GIFTCARD_URL}" target="_blank" rel="noopener">Toch twijfel? Bekijk de cadeaubon</a>
        <button class="restart" id="restartBtn">↺ Opnieuw doen voor een andere vader</button>
      </div>
    </div>`;
  document.getElementById('restartBtn').onclick = () => {
    current = 0;
    Object.keys(profiles).forEach(k => scores[k] = 0);
    renderIntro();
  };
}

renderIntro();
</script>
